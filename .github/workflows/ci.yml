name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Create venv and install
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Run tests with coverage gate
        run: |
          uv run pytest --cov=src/abackup --cov-fail-under=90 -q
